<style>
body { background: linear-gradient(135deg, #00ff88, #0066ff); font-family: Arial, sans-serif; color: white; overflow-x: hidden; animation: fond 10s infinite alternate; } 
@keyframes fond { from { background-position: left; } to { background-position: right; } } 
h1, p { text-shadow: 0 0 15px white; } 
.profil { border-radius: 50%; border: 4px solid white; box-shadow: 0 0 25px cyan; animation: flotte 3s ease-in-out infinite; } 
@keyframes flotte { 50% { transform: translateY(-10px); } } 
.carte { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; width: 500px; box-shadow: 0 0 20px black; } 
.btn { background: cyan; color: black; padding: 15px 30px; border-radius: 15px; border: none; cursor: pointer; font-size: 20px; transition: 0.3s; } 
.btn:hover { transform: scale(1.1); box-shadow: 0 0 20px cyan; } 
.etoile { position: fixed; color: white; animation: tombe 5s linear infinite; z-index: -1; } 
@keyframes tombe { from { transform: translateY(-100px); } to { transform: translateY(110vh); } } 
body { cursor: url("https://cur.cursors-4u.net/cursors/cur-2/cur116.cur"), auto; } 

.container { position: relative; display: flex; justify-content: center; align-items: center; } 
.container .glass { position: relative; width: 260px; height: 200px; background: linear-gradient(#fff2, transparent); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 25px rgba(0, 0, 0, 0.25); display: flex; justify-content: center; align-items: center; transition: 0.5s; border-radius: 10px; margin: 0 -45px; backdrop-filter: blur(10px); transform: rotate(calc(var(--r) * 1deg)); } 
.container:hover .glass { transform: rotate(0deg); margin: 0 10px; } 
.container .glass::before { content: attr(data-text); position: absolute; bottom: 0; width: 100%; height: 40px; background: rgba(255, 255, 255, 0.05); display: flex; justify-content: center; align-items: center; color: #fff; } 
.container .glass svg { fill: #fff; transition: 0.5s; } 

.card { position: fixed; top: 50px; left: 50px; width: 190px; height: 120px; padding: 0.5rem; background: rgba(198, 198, 198, 0.34); border-radius: 8px; backdrop-filter: blur(5px); border-bottom: 3px solid rgba(255, 255, 255, 0.440); border-left: 2px rgba(255, 255, 255, 0.545) outset; box-shadow: -40px 50px 30px rgba(0, 0, 0, 0.280); transform: skewX(10deg); transition: .4s; overflow: hidden; color: white; } 
.card:hover { height: 254px; transform: skew(0deg); } 
.align { padding: 1rem; display: flex; flex-direction: row; gap: 5px; align-self: flex-start; } 
.red { width: 10px; height: 10px; border-radius: 50%; background-color: #ff605c; box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.280); } 
.yellow { width: 10px; height: 10px; border-radius: 50%; background-color: #ffbd44; box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.280); } 
.green { width: 10px; height: 10px; border-radius: 50%; background-color: #00ca4e; box-shadow: -5px 5px 5px rgba(0, 0, 0, 0.280); } 
.card h1 { text-align: center; margin: 1.3rem; color: rgb(218, 244, 237); text-shadow: -10px 5px 10px rgba(0, 0, 0, 0.573); } 
</style> 

<script>
setInterval(() => { 
    let etoile = document.createElement("div"); 
    etoile.innerHTML = "✦"; 
    etoile.classList.add("etoile"); 
    etoile.style.left = Math.random() * window.innerWidth + "px"; 
    etoile.style.fontSize = Math.random() * 20 + 10 + "px"; 
    document.body.appendChild(etoile); 
    setTimeout(() => { etoile.remove(); }, 5000); 
}, 200);
</script>
