<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Solex_OFF Portfolio</title>

<style>
body {
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:Arial, sans-serif;
    background: linear-gradient(to right, grey, black);
    overflow-x:hidden;
}

/* ===== HEADER ===== */
.profile-img {
    border-radius:50%;
    width:160px;
    position:absolute;
    top:20px;
    left:80%;
}

.title1 {
    font-size:50px;
    position:absolute;
    top:130px;
    left:78%;
}

.title2 {
    font-size:50px;
    position:absolute;
    top:185px;
    left:79%;
}

/* ===== CONTAINER ===== */
.container {
    display:flex;
    gap:20px;
    margin-top:200px;
}

/* ===== GLASS BUTTONS ===== */
.glass {
    width:200px;
    height:150px;
    background: rgba(255,255,255,0.1);
    border-radius:15px;
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
    position:relative;
    color:white;
    text-decoration:none;
}

.glass:hover {
    transform: scale(1.05);
}

/* ===== CARD ===== */
.card {
    position:fixed;
    top:50px;
    left:50px;
    width:190px;
    height:120px;
    padding:0.5rem;
    background: rgba(198,198,198,0.34);
    border-radius:8px;
    backdrop-filter: blur(5px);
    border-bottom:3px solid rgba(255,255,255,0.44);
    box-shadow:-40px 50px 30px rgba(0,0,0,0.28);
    color:white;
    transition:0.4s;
}

.card:hover {
    height:200px;
}

.red,.yellow,.green {
    width:10px;
    height:10px;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
}

.red {background:#ff605c;}
.yellow {background:#ffbd44;}
.green {background:#00ca4e;}
</style>

</head>

<body>

<!-- HEADER -->
<img class="profile-img"
src="https://yt3.googleusercontent.com/fvmpf0sG2XEwR0f6cuLUFIILrTUykNjJ-kb-N3IyCa6yVFJmxiPkN6nmxvTTR4bWIvuaCUrZ3V0=s160-c-k-c0x00ffffff-no-rj">

<div class="title1">Solex_OFF</div>
<div class="title2">Portfolio</div>

<!-- BUTTONS -->
<div class="container">

<a class="glass" href="https://github.com/solexoff03-code" target="_blank">
GitHub
</a>

<a class="glass" href="https://github.com/solexoff03-code?tab=repositories" target="_blank">
Projets
</a>

<a class="glass" href="https://discord.gg/NQPAxFpd8a" target="_blank">
Discord
</a>

</div>

<!-- CARD -->
<div class="card">
<div>
<span class="red"></span>
<span class="yellow"></span>
<span class="green"></span>
</div>

<h3>Ouvre Moi</h3>
<p>Le portfolio n’est pas terminé</p>
</div>

</body>
</html>
